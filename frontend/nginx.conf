server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index dashboard.html;

    # 所有路由都導向對應的 HTML 文件或 dashboard.html
    location / {
        try_files $uri $uri/ /dashboard.html;
    }

    # 靜態資源快取設定
    location ~* \.(js|css)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(html)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # 隱藏 Nginx 版本
    server_tokens off;
}
