name: Deploy to Zeabur

on:
  push:
    branches:
      - main   # 只有 main merge 才觸發部署

jobs:
  # 基本檢查，確保 main 不會部署壞掉的東西
  check-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Check syntax
        run: python -m py_compile main.py app/core/config.py

  check-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # Zeabur 透過 GitHub 整合自動部署，這個 job 只是通知
  deploy:
    needs: [check-backend, check-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy triggered
        run: echo "✅ Checks passed. Zeabur will auto-deploy from main."
