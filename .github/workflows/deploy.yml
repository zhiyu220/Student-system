name: Deploy to Zeabur

on:
  push:
    branches:
      - main

jobs:
  check-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Check syntax
        run: python -m py_compile main.py app/core/config.py

  deploy:
    needs: [check-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy triggered
        run: echo "✅ Backend check passed. Zeabur will auto-deploy from main."
